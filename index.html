<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/svg+xml"
      sizes="any"
      href="/bolasso_2026/bolasso-trophy.svg?v=2"
    />
    <link
      rel="shortcut icon"
      type="image/svg+xml"
      href="/bolasso_2026/bolasso-trophy.svg?v=2"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#061a14" />
    <script>
      (() => {
        const savedTheme = localStorage.getItem('bolasso-theme')
        const theme =
          savedTheme === 'light' || savedTheme === 'dark'
            ? savedTheme
            : matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light'
        document.documentElement.dataset.theme = theme
        document.documentElement.style.colorScheme = theme
      })()
    </script>
    <meta
      name="description"
      content="Bolão entre amigos para a Copa do Mundo de 2026."
    />
    <title>Bolasso 2026</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
